<!-- lumber_track/templates/lumber_track/report_form.html -->
{% extends 'lumber_track/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1 class="h2 mb-3">
            <i class="bi bi-graph-up"></i> {{ title }}
        </h1>
        <p class="text-muted">Выберите период для формирования отчета</p>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="get" action="{% url url_name %}">
                    <div class="mb-3">
                        <label for="date_from" class="form-label">Дата начала периода</label>
                        <input type="date" class="form-control" id="date_from" name="date_from"
                               value="{{ date_from|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="date_to" class="form-label">Дата окончания периода</label>
                        <input type="date" class="form-control" id="date_to" name="date_to"
                               value="{{ date_to|default:'' }}" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-search"></i> Сформировать отчет
                        </button>
                        <a href="{% url 'lumber_track:reports_page' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Назад к отчетам
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
